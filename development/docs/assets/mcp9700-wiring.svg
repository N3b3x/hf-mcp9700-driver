<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" aria-labelledby="t-w d-w">
  <title id="t-w">MCP9700 to ESP32-C6 minimal wiring</title>
  <desc id="d-w">3.3 V and ground from ESP32-C6 to MCP9700 Vdd and Vss; MCP9700 Vout to GPIO0 ADC1 channel 0.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .wire-pwr { stroke: #c53030; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-gnd { stroke: #4a5568; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-sig { stroke: #2b6cb0; stroke-width: 3; fill: none; stroke-linecap: round; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
      .smallL   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: start; }
      .pinL     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 13px; fill: #1a202c; text-anchor: start; }
      .pinR     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 13px; fill: #1a202c; text-anchor: end; }
      .wlbl     { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; text-anchor: middle; }
      .legend   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
      .titleL   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: start; }
    ]]></style>
  </defs>
  <rect class="panel" width="720" height="360"/>
  <text class="head" x="360" y="28">Typical MCP9700 -&gt; ESP32-C6 connections (default example)</text>

  <!-- ESP32-C6 box (left) -->
  <rect class="box" x="60" y="80" width="200" height="200" rx="6"/>
  <text class="title" x="160" y="106">ESP32-C6</text>
  <text class="small" x="160" y="122">3.3 V rail &#183; GND &#183; GPIO0</text>

  <!-- Internal divider lines -->
  <line x1="60" y1="140" x2="260" y2="140" stroke="#cbd5e0"/>
  <line x1="60" y1="180" x2="260" y2="180" stroke="#cbd5e0"/>
  <line x1="60" y1="220" x2="260" y2="220" stroke="#cbd5e0"/>

  <!-- Pin labels (left-aligned) -->
  <text class="pinL"   x="76" y="166">3V3</text>
  <text class="pinL"   x="76" y="206">GND</text>
  <text class="pinL"   x="76" y="246">GPIO0</text>
  <text class="smallL" x="76" y="262">ADC1_CH0, atten = 12 dB</text>

  <!-- MCU output terminals (right side of MCU box) -->
  <circle cx="260" cy="160" r="4" fill="#1a365d"/>
  <circle cx="260" cy="200" r="4" fill="#1a365d"/>
  <circle cx="260" cy="240" r="4" fill="#1a365d"/>

  <!-- MCP9700 box (right) -->
  <rect class="chip" x="460" y="100" width="200" height="160" rx="8"/>
  <text class="title" x="560" y="128">MCP9700 / 9700A</text>
  <text class="small" x="560" y="146">SOT-23-3 / TO-92</text>

  <!-- Sensor pin labels (left-aligned) -->
  <text class="pinL" x="476" y="186">Vdd</text>
  <text class="pinL" x="476" y="216">Vss</text>
  <text class="pinL" x="476" y="246">Vout</text>

  <!-- Sensor pin terminals (left side of sensor box) -->
  <circle cx="460" cy="180" r="4" fill="#c05621"/>
  <circle cx="460" cy="210" r="4" fill="#c05621"/>
  <circle cx="460" cy="240" r="4" fill="#c05621"/>

  <!-- Wires (clean L-shaped, with labels above the horizontal segment) -->
  <text class="wlbl" fill="#c53030" x="360" y="148">+3.3 V (red)</text>
  <path class="wire-pwr" d="M 260 160 L 360 160 L 360 180 L 460 180"/>

  <text class="wlbl" fill="#4a5568" x="360" y="194">GND (black)</text>
  <path class="wire-gnd" d="M 260 200 L 360 200 L 360 210 L 460 210"/>

  <text class="wlbl" fill="#2b6cb0" x="360" y="234">Analog signal (blue)</text>
  <path class="wire-sig" d="M 260 240 L 460 240"/>

  <!-- Caption below -->
  <text class="small" x="360" y="312">Vout typically swings 0.10 .. 1.75 V across -40 .. +125 &#176;C with the default 0.5 V intercept and 10 mV/&#176;C slope.</text>

  <!-- Bottom legend in its own row -->
  <g transform="translate(60, 340)">
    <text class="titleL" x="0" y="0" fill="#1a365d">Legend</text>
    <line class="wire-pwr" x1="80"  y1="-3" x2="104" y2="-3"/>
    <text class="legend" x="112" y="0">+3.3 V supply</text>
    <line class="wire-gnd" x1="220" y1="-3" x2="244" y2="-3"/>
    <text class="legend" x="252" y="0">Ground return</text>
    <line class="wire-sig" x1="350" y1="-3" x2="374" y2="-3"/>
    <text class="legend" x="382" y="0">Analog signal to MCU ADC input</text>
  </g>
</svg>
