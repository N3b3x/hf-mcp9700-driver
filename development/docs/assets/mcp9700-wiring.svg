<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" role="img" aria-labelledby="t-w d-w">
  <title id="t-w">MCP9700 to ESP32-C6 minimal wiring</title>
  <desc id="d-w">3.3 V and ground from ESP32-C6 to MCP9700 Vdd and Vss; MCP9700 Vout to GPIO0 ADC1 channel 0.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .wire-pwr { stroke: #c53030; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-gnd { stroke: #4a5568; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-sig { stroke: #2b6cb0; stroke-width: 3; fill: none; stroke-linecap: round; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .label    { font-family: system-ui, sans-serif; font-size: 13px; fill: #1a202c; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
      .pin      { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 13px; fill: #1a202c; }
      .wlbl     { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
    ]]></style>
  </defs>
  <rect class="panel" width="640" height="320"/>
  <text class="head" x="320" y="28">Typical MCP9700 &#8594; ESP32-C6 connections (default example)</text>

  <rect class="box" x="40" y="60" width="200" height="200" rx="6"/>
  <text class="title" x="140" y="86">ESP32-C6</text>
  <text class="small" x="140" y="104" text-anchor="middle">3.3 V rail &#183; GND &#183; GPIO0</text>

  <line x1="40" y1="120" x2="240" y2="120" stroke="#cbd5e0"/>
  <line x1="40" y1="160" x2="240" y2="160" stroke="#cbd5e0"/>
  <line x1="40" y1="200" x2="240" y2="200" stroke="#cbd5e0"/>

  <text class="pin"   x="56" y="146">3V3</text>
  <text class="pin"   x="56" y="186">GND</text>
  <text class="pin"   x="56" y="226">GPIO0</text>
  <text class="small" x="56" y="246">ADC1_CH0, atten = 12 dB</text>

  <circle cx="240" cy="140" r="3.5" fill="#1a365d"/>
  <circle cx="240" cy="180" r="3.5" fill="#1a365d"/>
  <circle cx="240" cy="220" r="3.5" fill="#1a365d"/>

  <rect class="chip" x="400" y="100" width="200" height="140" rx="8"/>
  <text class="title" x="500" y="128">MCP9700 / 9700A</text>
  <text class="small" x="500" y="146" text-anchor="middle">SOT-23-3 / TO-92</text>
  <text class="pin"   x="416" y="178">Vdd</text>
  <text class="pin"   x="416" y="208">Vss</text>
  <text class="pin"   x="416" y="238">Vout</text>

  <circle cx="400" cy="172" r="3.5" fill="#c05621"/>
  <circle cx="400" cy="202" r="3.5" fill="#c05621"/>
  <circle cx="400" cy="232" r="3.5" fill="#c05621"/>

  <path class="wire-pwr" d="M 240 140 L 320 140 L 320 172 L 400 172"/>
  <text class="wlbl" x="320" y="132">3.3 V</text>

  <path class="wire-gnd" d="M 240 180 L 360 180 L 360 202 L 400 202"/>
  <text class="wlbl" x="320" y="172">GND</text>

  <path class="wire-sig" d="M 240 220 L 340 220 L 340 232 L 400 232"/>
  <text class="wlbl" x="320" y="212">Analog out</text>

  <text class="small" x="320" y="290" text-anchor="middle">Vout typically swings 0.10..1.75 V across -40..+125 &#176;C with the default 0.5 V intercept and 10 mV/&#176;C slope.</text>
</svg>
