---
# ESP32 MCP9700 Driver — app matrix for build scripts / CI
version: "1.0"

metadata:
  project: "ESP32 MCP9700 Driver Examples"
  default_app: "mcp9700_esp32c6_example"
  target: "esp32c6"
  idf_versions: ["release/v5.5", "release/v5.4"]
  build_types: [["Debug", "Release"], ["Debug"]]

apps:
  mcp9700_esp32c6_example:
    description: "MCP9700 on ESP32-C6 ADC1 CH0 (GPIO0), oneshot + optional calibration"
    source_file: "mcp9700_esp32c6_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "adc_oneshot on ADC_UNIT_1"
      - "Optional adc_cali curve fitting when supported"
      - "Logical ADC channel 0 mapped to GPIO0 / ADC_CHANNEL_0"

build_config:
  build_types:
    Debug:
      description: "Debug build"
      cmake_build_type: "Debug"
      optimization: "-O0"
      debug_level: "-g3"
      defines: ["DEBUG"]

    Release:
      description: "Release build"
      cmake_build_type: "Release"
      optimization: "-O2"
      debug_level: "-g0"
      defines: ["NDEBUG"]

  build_directory_pattern: "build-app-{app_type}-type-{build_type}-target-{target}-idf-{idf_version}"
  project_name_pattern: "esp32_mcp9700_{app_type}_app"

ci_config:
  timeout_minutes: 30
  fail_fast: false
  exclude_combinations: []
  special_apps: []
